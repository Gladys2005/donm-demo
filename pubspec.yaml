name: donm
description: Application de livraison DonM pour la Côte d'Ivoire
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  freezed_annotation: ^3.1.0

  # Navigation
  go_router: ^15.1.2
  auto_route: ^9.3.0+1

  # UI Components
  cupertino_icons: ^1.0.2
  material_symbols_icons: ^4.2719.3
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^3.2.0
  flutter_spinkit: ^5.2.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # Network
  dio: ^5.3.2
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  http: ^1.1.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^13.0.1
  geocoding: ^4.0.0
  flutter_polyline_points: ^3.1.0

  # Camera & Image
  image_picker: ^1.0.4
  camera: ^0.11.0+2
  file_picker: ^11.0.2
  permission_handler: ^12.0.1

  # Authentication
  local_auth: ^2.1.6
  flutter_secure_storage: ^10.0.0

  # Notifications
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_crashlytics: ^5.1.0
  flutter_local_notifications: ^19.5.0

  # WebSocket
  web_socket_channel: ^3.0.3
  socket_io_client: ^3.1.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  logger: ^2.0.2+1
  package_info_plus: ^9.0.1
  device_info_plus: ^11.3.0
  connectivity_plus: ^7.1.0

  # Validation
  form_validator: ^2.1.1

  # Charts
  fl_chart: ^0.71.0

  # QR Code
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  freezed: ^3.0.0-0.0.dev
  json_serializable: ^6.7.1
  retrofit_generator: ^9.1.5
  hive_generator: ^2.0.1
  auto_route_generator: ^9.0.0

  # Testing
  mockito: ^5.4.2
  bloc_test: ^10.0.0
  golden_toolkit: ^0.15.0

  # Linting
  flutter_lints: ^5.0.0
  very_good_analysis: ^7.0.0

  # Icons
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.3.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/flags/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_intl:
  enabled: true
  arb_dir: lib/l10n
  output_dir: lib/generated
  output_localization_file: app_localizations.dart
